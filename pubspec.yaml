name: secure_file_vault
description: A privacy-first, cryptographically robust macOS desktop application for encrypted file storage.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # macOS native UI
  macos_ui: ^2.0.0
  macos_window_utils: ^1.0.0
  
  # State management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Cryptography
  cryptography: ^2.7.0
  encrypt: ^5.0.1
  crypto: ^3.0.3
  
  # Keychain and secure storage
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  
  # File operations
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # JSON and data
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  uuid: ^4.2.1
  
  # System integration
  tray_manager: ^0.2.0
  window_manager: ^0.3.7
  desktop_multi_window: ^0.2.0
  desktop_drop: ^0.5.0
  
  # Networking for auto-destruction
  dio: ^5.4.0
  
  # MIME type detection
  mime: ^1.0.4
  
  # Utilities
  intl: ^0.18.1
  logger: ^2.0.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  mockito: ^5.4.4
  bloc_test: ^9.1.5

flutter:
  uses-material-design: false
  
  assets:
    - assets/icon.png
    - assets/tray_icon.png
  
